<html>

<body>

    <section>
    </section>

    <article>

        <form action="/send-message" method="post">

            <label for="name">Name:</label>

            <input 
                type="text" 
                id="name" 
                name="name" 
                placeholder="Escreva seu nome..."
            >

            <br><br>

            <label for="email">Email:</label>

            <input 
                type="email" 
                id="email" 
                name="email"
            >

            <br><br>

            <label for="message">Message:</label>

            <br>

            <textarea 
                id="message" 
                name="message" 
                rows="4" 
                cols="50"
            ></textarea>

            <br><br>

            <label for="pdf">Adicione seu PDF:</label>

            <input 
                type="file" 
                id="pdf" 
                name="pdf" 
                accept=".pdf"
            >

            <br><br>

            <label for="subscribe">
                Subscribe to newsletter:
            </label>

            <input 
                type="checkbox" 
                id="subscribe" 
                name="subscribe"
            >

            <br><br>

            <button type="reset">
                Reset
            </button>

            <button type="submit">
                Submit
            </button>

        </form>

    </article>

    <footer>

        <p>
            © 2026 oxetech.
            Todos os direitos reservados.
        </p>

    </footer>

</body>

</html>
